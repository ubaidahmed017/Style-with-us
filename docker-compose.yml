version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stylewithus
      POSTGRES_USER: stylewithus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stylewithus_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stylewithus"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stylewithus:${POSTGRES_PASSWORD:-stylewithus_dev}@postgres:5432/stylewithus
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # NOTE: ML (body analysis, try-on) runs on-device in the Flutter client, so no
  # Celery workers are needed. Redis is kept for future async work. See
  # .kiro/specs/style-with-us/requirements.md (on-device, privacy-first ML).

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./admin-portal/dist:/usr/share/nginx/html/admin:ro
    depends_on:
      - api

volumes:
  postgres_data:
