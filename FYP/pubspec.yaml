name: fyp
description: "Style With Us — AI-powered fashion platform."
publish_to: 'none'

version: 1.0.0+1

environment:
  # Works with any Flutter stable from ~3.19 onward (Dart 3.5+).
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  go_router: ^13.0.0
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.0.0
  flutter_stripe: ^10.1.0
  dio: ^5.4.0
  cached_network_image: ^3.3.0
  camera: ^0.10.0
  image_picker: ^1.1.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  glassmorphism: ^3.0.0
  google_mlkit_pose_detection: ^0.10.0
  shared_preferences: ^2.3.0
  intl: ^0.19.0
  uuid: ^4.4.0
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.13.1

# App launcher icons. Icons are already generated and committed, but you can
# regenerate all platforms from the master with:  dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/app_icon.png"
  adaptive_icon_background: "#6C63FF"
  adaptive_icon_foreground: "assets/logo/app_logo.png"
  web:
    generate: true
    image_path: "assets/logo/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/logo/
